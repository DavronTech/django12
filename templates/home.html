<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}Mening Saytim{% endblock %}</title>
</head>
<body class="bg-gray-50 text-slate-900 font-sans antialiased">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-indigo-600">LOGO</a>
            
            <div class="flex items-center gap-6">
                {% if user.is_authenticated %}
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-medium text-gray-600">Salom, {{ user.username }}</span>
                        <a href="{% url 'profile' %}" class="text-sm font-semibold hover:text-indigo-600 transition">Profil</a>
                        <a href="{% url 'logout' %}" class="text-sm font-semibold text-red-600 hover:text-red-700 transition">Chiqish</a>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="text-sm font-semibold hover:text-indigo-600 transition">Kirish</a>
                    <a href="{% url 'sign-up' %}" class="text-sm px-5 py-2 bg-indigo-600 text-white rounded-full hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">Ro‘yxatdan o‘tish</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
